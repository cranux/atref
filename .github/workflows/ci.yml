name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel older runs of the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vscode:
    name: VSCode extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax check
        run: node --check src/extension.js

      - name: Package (.vsix)
        run: npx -y @vscode/vsce@latest package --out atref-ci.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-ci
          path: vscode/atref-ci.vsix
          retention-days: 14

  jetbrains:
    name: JetBrains plugin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jetbrains
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: gradle buildPlugin --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: jetbrains-plugin-ci
          path: jetbrains/build/distributions/*.zip
          retention-days: 14
