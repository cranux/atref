name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  vscode:
    name: Package VSCode extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Package
        run: npx -y @vscode/vsce@latest package

      - uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: vscode/*.vsix

  jetbrains:
    name: Package JetBrains plugin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jetbrains
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: gradle buildPlugin --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: jetbrains-plugin
          path: jetbrains/build/distributions/*.zip

  release:
    name: Publish GitHub Release
    needs: [vscode, jetbrains]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vscode-extension
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: jetbrains-plugin
          path: dist/

      - name: List release assets
        run: ls -la dist/

      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: dist/*
          generate_release_notes: true
          body: |
            AtRef ${{ github.ref_name }}

            ## Installation

            **VS Code / Cursor / Windsurf** — download the `.vsix` below, then:

            ```bash
            code --install-extension atref-*.vsix
            ```

            **JetBrains IDEs** (IDEA / PyCharm / WebStorm / GoLand / RubyMine / PhpStorm / Rider / CLion / RustRover) — download the `.zip` below, then in your IDE:
            **Settings → Plugins → ⚙ → Install Plugin from Disk…** and select the zip.

            ---
