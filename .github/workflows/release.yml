name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  vscode:
    name: Package VSCode extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Package
        run: npx -y @vscode/vsce@latest package

      - uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: vscode/*.vsix

  jetbrains:
    name: Package JetBrains plugin
    # TEMPORARILY DISABLED: gradle buildPlugin fails in CI (intellij-platform-gradle-plugin
    # config issue under investigation). Re-enable by removing the `if: false` line below
    # AND re-adding `jetbrains` to the release job's `needs:` array AND uncommenting the
    # jetbrains-plugin download step + the "JetBrains IDEs" install block in the body.
    if: false
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jetbrains
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"   # pinned: see note in ci.yml

      - name: Build plugin
        run: gradle buildPlugin --no-daemon --stacktrace --info

      - uses: actions/upload-artifact@v4
        with:
          name: jetbrains-plugin
          path: jetbrains/build/distributions/*.zip

  release:
    name: Publish GitHub Release
    # NOTE: jetbrains job temporarily removed from needs while it's disabled.
    needs: [vscode]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vscode-extension
          path: dist/

      # JetBrains download step disabled while the jetbrains build job is off.
      # - uses: actions/download-artifact@v4
      #   with:
      #     name: jetbrains-plugin
      #     path: dist/

      - name: List release assets
        run: ls -la dist/

      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: dist/*
          generate_release_notes: true
          body: |
            AtRef ${{ github.ref_name }}

            ## Installation

            **VS Code / Cursor / Windsurf** — download the `.vsix` below, then:

            ```bash
            code --install-extension atref-*.vsix
            ```

            > ⚠️ JetBrains plugin (`.zip`) is not in this release — CI build is being fixed.
            > For now build it locally: open `jetbrains/` in IDEA, Gradle tool window → `buildPlugin`.

            ---
